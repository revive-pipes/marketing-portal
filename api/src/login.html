<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sign in to the Revive Pipes client portal.">
<title>Sign In — Revive Pipes</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
<style>
  /* ====== LOGIN PAGE ====== */
  .login-page {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    overflow: hidden;
    background: #0a1628;
  }

  .login-inner {
    display: flex;
    width: 100%;
    max-width: var(--content-max);
    min-height: 100vh;
  }

  /* Background */
  .login-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .login-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(2px);
    transform: scale(1.03);
  }

  .login-bg-overlay-left {
    position: absolute;
    inset: 0;
    background: linear-gradient(to right,
      #0a1628 0%,
      rgba(10,22,40,0.85) 25%,
      rgba(10,22,40,0.5) 55%,
      transparent 100%);
    z-index: 1;
  }

  .login-bg-overlay-tb {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.35) 0%,
      transparent 25%,
      transparent 75%,
      rgba(0,0,0,0.35) 100%);
    z-index: 2;
  }

  /* Left side */
  .login-left {
    position: relative;
    z-index: 10;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px;
    color: var(--white);
  }

  .login-logo {
    position: absolute;
    top: 48px;
    left: 64px;
  }

  .login-logo img {
    height: 56px;
    width: auto;
  }

  .login-headline {
    font-size: clamp(34px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -1px;
    margin-bottom: 4px;
    color: var(--white);
  }

  .login-headline-accent {
    font-size: clamp(34px, 5vw, 56px);
    font-weight: 800;
    line-height: 1.08;
    letter-spacing: -1px;
    margin-bottom: 24px;
    background: linear-gradient(to top, #2E7D32 0%, #4CAF50 40%, #ffffff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .login-desc {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.8;
    color: rgba(255,255,255,0.7);
    max-width: 540px;
    margin-bottom: 36px;
  }

  .login-stats {
    display: flex;
    gap: 40px;
    padding-top: 28px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .login-stat-number {
    font-size: 28px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -0.5px;
  }

  .login-stat-label {
    font-size: 12px;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    margin-top: 4px;
  }

  /* Right side */
  .login-right {
    position: relative;
    z-index: 10;
    width: 520px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
    flex-shrink: 0;
  }

  /* Card */
  .login-card {
    width: 100%;
    max-width: 420px;
    background: var(--white);
    border-radius: 20px;
    padding: 44px 36px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25), 0 4px 16px rgba(0,0,0,0.1);
  }

  .login-card-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .login-card-eyebrow {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gray-500);
    margin-bottom: 8px;
  }

  .login-card-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--gray-900);
    letter-spacing: -0.3px;
  }

  .login-form-group {
    margin-bottom: 20px;
  }

  .login-form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gray-500);
    margin-bottom: 8px;
    margin-left: 2px;
  }

  .login-form-input {
    width: 100%;
    padding: 16px 18px;
    background: var(--gray-100);
    border: 2px solid transparent;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray-900);
    outline: none;
    transition: all 0.2s ease;
  }

  .login-form-input::placeholder {
    color: var(--gray-400);
    font-weight: 400;
  }

  .login-form-input:focus {
    border-color: var(--gray-900);
    background: var(--white);
    box-shadow: 0 0 0 4px rgba(10,22,40,0.06);
  }

  .login-submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--gray-900);
    color: var(--white);
    border: none;
    border-radius: 12px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s ease;
    margin-top: 8px;
  }

  .login-submit-btn:hover {
    opacity: 0.9;
    box-shadow: 0 8px 24px rgba(10,22,40,0.25);
    transform: translateY(-1px);
  }

  .login-card-helper {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--gray-500);
    font-weight: 500;
  }

  /* Request access state */
  .login-request-info {
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.6;
    margin-bottom: 24px;
    text-align: center;
  }

  .login-back-link {
    display: block;
    width: 100%;
    text-align: center;
    margin-top: 16px;
    padding: 8px;
    background: none;
    border: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-500);
    cursor: pointer;
    transition: color 0.2s;
  }

  .login-back-link:hover {
    color: var(--gray-900);
  }

  /* Confirmation state */
  .login-confirm-icon {
    display: flex;
    justify-content: center;
    margin-bottom: 12px;
  }

  .login-confirm-text {
    font-size: 15px;
    color: var(--gray-600);
    line-height: 1.7;
    text-align: center;
    margin-bottom: 16px;
  }

  .login-confirm-email {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-900);
    text-align: center;
  }

  /* Footer */
  .login-footer {
    position: absolute;
    bottom: 28px;
    left: 64px;
    z-index: 10;
    font-size: 14px;
    color: rgba(255,255,255,0.8);
    font-weight: 500;
  }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 1024px) {
    .login-left { padding: 48px; }
    .login-right { width: 440px; padding: 36px; }
    .login-card { padding: 36px 28px; }
    .login-footer { left: 48px; }
    .login-stats { gap: 28px; }
    .login-logo { left: 48px; }
  }

  @media (max-width: 860px) {
    .login-inner { flex-direction: column; }
    .login-left { padding: 100px 32px 32px; flex: none; }
    .login-logo { top: 28px; left: 32px; }
    .login-headline, .login-headline-accent { font-size: 30px; }
    .login-desc { font-size: 13px; margin-bottom: 24px; }
    .login-stats { gap: 24px; }
    .login-stat-number { font-size: 22px; }
    .login-stat-label { font-size: 11px; }
    .login-right { width: 100%; padding: 0 24px 32px; }
    .login-card { max-width: 440px; margin: 0 auto; }
    .login-footer { display: none; }
  }

  @media (max-width: 480px) {
    .login-left { padding: 90px 24px 24px; }
    .login-logo { top: 24px; left: 24px; }
    .login-logo img { height: 40px; }
    .login-headline, .login-headline-accent { font-size: 26px; }
    .login-desc { display: none; }
    .login-stats { gap: 20px; }
    .login-stat-number { font-size: 20px; }
    .login-right { padding: 0 16px 24px; }
    .login-card { padding: 32px 24px; border-radius: 16px; }
    .login-card-title { font-size: 20px; }
    .login-form-input { padding: 14px 16px; }
    .login-submit-btn { padding: 14px; }
  }
</style>
</head>
<body>

<div class="login-page">

  <!-- Background -->
  <div class="login-bg">
    <img id="bgImage" alt="">
    <div class="login-bg-overlay-left"></div>
    <div class="login-bg-overlay-tb"></div>
  </div>

  <div class="login-inner">

    <!-- Left -->
    <div class="login-left">
      <div class="login-logo">
        <img id="logoImage" src="assets/logo.png" alt="Logo">
      </div>
      <h1 class="login-headline" id="headline"></h1>
      <div class="login-headline-accent" id="headlineAccent"></div>
      <p class="login-desc" id="description"></p>
      <div class="login-stats" id="statsContainer"></div>
    </div>

    <!-- Right -->
    <div class="login-right">
      <div class="login-card">

        <!-- State 1: Email Entry -->
        <div id="stateEmail">
          <div class="login-card-header">
            <p class="login-card-eyebrow" id="cardEyebrow"></p>
            <h2 class="login-card-title" id="cardTitle"></h2>
          </div>
          <form id="emailForm">
            <div class="login-form-group">
              <label class="login-form-label" for="emailInput" id="emailLabel"></label>
              <input type="email" class="login-form-input" id="emailInput" placeholder="" required>
            </div>
            <button type="submit" class="login-submit-btn" id="submitBtn"></button>
          </form>
          <p class="login-card-helper" id="cardHelper"></p>
        </div>

        <!-- State 2: Request Access -->
        <div id="stateRequest" style="display: none;">
          <div class="login-card-header">
            <p class="login-card-eyebrow">Access Required</p>
            <h2 class="login-card-title">Request Access</h2>
          </div>
          <p class="login-request-info">This portal is for authorized clients only. Fill out the form below and we'll review your request.</p>
          <form id="requestForm">
            <div class="login-form-group">
              <label class="login-form-label">Full Name</label>
              <input type="text" class="login-form-input" id="requestName" placeholder="John Smith" required>
            </div>
            <div class="login-form-group">
              <label class="login-form-label">Email</label>
              <input type="email" class="login-form-input" id="requestEmail" placeholder="" readonly>
            </div>
            <div class="login-form-group">
              <label class="login-form-label">Organization</label>
              <input type="text" class="login-form-input" id="requestOrg" placeholder="HealthCorp Inc." required>
            </div>
            <div class="login-form-group">
              <label class="login-form-label">Job Title</label>
              <input type="text" class="login-form-input" id="requestTitle" placeholder="Facility Manager" required>
            </div>
            <button type="submit" class="login-submit-btn">Submit Request</button>
          </form>
          <button class="login-back-link" id="backToEmail">← Use a different email</button>
        </div>

        <!-- State 3: Confirmation -->
        <div id="stateConfirmation" style="display: none;">
          <div class="login-card-header">
            <div class="login-confirm-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </div>
            <h2 class="login-card-title">Request Sent</h2>
          </div>
          <p class="login-confirm-text">Your access request has been submitted. Our team will review it and get back to you shortly.</p>
          <p class="login-confirm-email" id="confirmationEmail"></p>
        </div>

      </div>
    </div>

  </div>

  <div class="login-footer" id="pageFooter">© 2026 Revive Pipe Restoration Inc.</div>

</div>

<script src="js/authConfig.js"></script>
<script>
(function () {
  'use strict';

  var msalInstance = null;

  function showState(state) {
    document.getElementById('stateEmail').style.display = state === 'email' ? 'block' : 'none';
    document.getElementById('stateRequest').style.display = state === 'request' ? 'block' : 'none';
    document.getElementById('stateConfirmation').style.display = state === 'confirmation' ? 'block' : 'none';
  }

  async function loadContent() {
    try {
      var res = await fetch('content/login.json');
      if (!res.ok) throw new Error('Failed to load login content');
      var content = await res.json();

      document.getElementById('headline').textContent = content.headline;
      document.getElementById('headlineAccent').textContent = content.headlineAccent;
      document.getElementById('description').textContent = content.description;

      if (content.backgroundImage) {
        document.getElementById('bgImage').src = content.backgroundImage;
      }

      var statsContainer = document.getElementById('statsContainer');
      for (var i = 0; i < content.stats.length; i++) {
        var div = document.createElement('div');
        var num = document.createElement('div');
        num.className = 'login-stat-number';
        num.textContent = content.stats[i].number;
        var label = document.createElement('div');
        label.className = 'login-stat-label';
        label.textContent = content.stats[i].label;
        div.appendChild(num);
        div.appendChild(label);
        statsContainer.appendChild(div);
      }

      document.getElementById('cardEyebrow').textContent = content.card.eyebrow;
      document.getElementById('cardTitle').textContent = content.card.title;
      document.getElementById('emailLabel').textContent = content.card.emailLabel;
      document.getElementById('emailInput').placeholder = content.card.emailPlaceholder;
      document.getElementById('submitBtn').textContent = content.card.buttonText;
      document.getElementById('cardHelper').textContent = content.card.footerText;

    } catch (err) {
      console.error('Content load error:', err);
    }
  }

  function handleResponse(response) {
    if (response !== null) {
      var account = response.account;
      sessionStorage.setItem('portalUser', JSON.stringify({
        name: account.name,
        email: account.username,
        id: account.homeAccountId
      }));
      window.location.href = 'index.html';
    } else {
      var accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) {
        window.location.href = 'index.html';
      }
    }
  }

  function handleEmailSubmit(e) {
    e.preventDefault();
    var email = document.getElementById('emailInput').value;
    if (!email) return;

    if (typeof msalInstance !== 'undefined' && msalInstance && typeof loginRequest !== 'undefined') {
      msalInstance.loginRedirect({
        scopes: loginRequest.scopes || ['openid', 'profile'],
        loginHint: email,
        extraQueryParameters: { login_hint: email }
      }).catch(function (error) {
        if (error.errorCode === 'user_not_found' ||
            error.errorCode === 'access_denied' ||
            error.errorCode === 'unauthorized_client') {
          document.getElementById('requestEmail').value = email;
          showState('request');
        }
      });
    } else {
      document.getElementById('requestEmail').value = email;
      showState('request');
    }
  }

  function handleRequestSubmit(e) {
    e.preventDefault();
    var requestData = {
      name: document.getElementById('requestName').value,
      email: document.getElementById('requestEmail').value,
      organization: document.getElementById('requestOrg').value,
      jobTitle: document.getElementById('requestTitle').value,
      timestamp: new Date().toISOString()
    };

    document.getElementById('confirmationEmail').textContent = "We'll notify you at " + requestData.email;
    showState('confirmation');
  }

  async function init() {
    await loadContent();

    // Event listeners
    document.getElementById('emailForm').addEventListener('submit', handleEmailSubmit);
    document.getElementById('requestForm').addEventListener('submit', handleRequestSubmit);
    document.getElementById('backToEmail').addEventListener('click', function () { showState('email'); });

    // MSAL init
    if (typeof msalConfig !== 'undefined') {
      try {
        msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.initialize();
        msalInstance.handleRedirectPromise()
          .then(handleResponse)
          .catch(function (error) {
            if (error.errorCode === 'user_not_found' ||
                error.errorCode === 'access_denied' ||
                error.errorCode === 'unauthorized_client') {
              showState('request');
            }
          });
      } catch (err) {
        // MSAL init failed — continue without SSO
      }
    }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>

</body>
</html>
